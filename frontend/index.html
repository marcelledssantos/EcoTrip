<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>EcoTrip | Simulador de Impacto Ambiental</title>

  <link rel="stylesheet" href="css/style.css?v=2" />
</head>

<body>

  <main class="page">

    <section class="hero-panel">

      <nav class="navbar">

        <div class="brand">
          <div class="brand-icon">🌱</div>
          <strong>EcoTrip</strong>
        </div>

        <span class="nav-text">
          Simulador de impacto ambiental
        </span>

      </nav>

      <div class="hero-content">

        <span class="tag">
          Viagens sustentáveis
        </span>

        <h1>
          Calcule o impacto ambiental da sua próxima viagem
        </h1>

        <p>
          Compare meios de transporte, estime a emissão de CO₂
          e descubra alternativas mais sustentáveis.
        </p>

      </div>

    </section>

    <section class="app-panel">

      <section class="calculator-card">

        <h2>Simular viagem</h2>

        <form id="tripForm">

          <div class="form-grid">

            <div class="field">
              <label for="origin">Origem</label>
              <select id="origin"></select>
            </div>

            <div class="field">
              <label for="destination">Destino</label>
              <select id="destination"></select>
            </div>

            <div class="field">
              <label for="transport">Meio de transporte</label>

              <select id="transport">
                <option value="car">Carro</option>
                <option value="bus">Ônibus</option>
                <option value="plane">Avião</option>
                <option value="train">Trem</option>
                <option value="motorcycle">Moto</option>
              </select>
            </div>

            <div class="field">
              <label for="profile">Perfil do trajeto</label>

              <select id="profile">
                <option value="urban">Urbano</option>
                <option value="highway">Rodovia</option>
                <option value="mixed">Misto</option>
              </select>
            </div>

          </div>

          <div class="field">
            <label for="passengers">
              Quantidade de passageiros
            </label>

            <input
              type="number"
              id="passengers"
              value="1"
              min="1"
            />
          </div>

          <button type="submit">
            Calcular impacto
          </button>

        </form>

        <div id="message" class="message"></div>

      </section>

      <section id="result" class="result-card hidden"></section>

    </section>

  </main>

  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/app.js"></script>

</body>
</html>
